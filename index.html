  "methods": [
    {
      "id": "classic",
      "kind": "方法类型",
      "name": "普通Meta",
      "problem": "回答某干预或暴露是否总体有效。",
      "fit": "干预、药物、护理、康复、营养等有相似对照的问题。",
      "outputs": "森林图、异质性、亚组、敏感性、发表偏倚。",
      "example": "某治疗对复发性流产活产率的影响。"
    },
    {
      "id": "diagnostic",
      "kind": "方法类型",
      "name": "诊断学Meta",
      "problem": "回答某检查方法诊断准确性如何。",
      "fit": "影像、检验、评分量表、筛查工具。",
      "outputs": "敏感度、特异度、SROC、DOR、Fagan图。",
      "example": "某影像指标对疾病诊断价值的系统评价。"
    },
    {
      "id": "correlation",
      "kind": "方法类型",
      "name": "相关性Meta",
      "problem": "回答两个指标之间是否存在稳定相关。",
      "fit": "心理、运动、营养、检验指标相关性问题。",
      "outputs": "合并相关系数、亚组、元回归。",
      "example": "身体活动与焦虑评分之间的相关性。"
    },
    {
      "id": "prognosis",
      "kind": "方法类型",
      "name": "预后Meta",
      "problem": "回答某因素是否影响未来结局。",
      "fit": "生存、复发、死亡、并发症风险等。",
      "outputs": "HR、RR、OR、预后因素分层。",
      "example": "某临床指标对术后复发风险的预测价值。"
    },
    {
      "id": "dose",
      "kind": "方法类型",
      "name": "剂量反应Meta",
      "problem": "回答剂量或暴露水平变化与结局的关系。",
      "fit": "营养摄入、运动剂量、药物剂量、暴露时间。",
      "outputs": "线性/非线性曲线、剂量-效应趋势。",
      "example": "运动时间与代谢指标改善之间的剂量反应。"
    },
    {
      "id": "prevalence",
      "kind": "方法类型",
      "name": "单率Meta",
      "problem": "回答某发生率、患病率或比例的总体水平。",
      "fit": "流行病学、并发症、接受率、不良反应率。",
      "outputs": "合并率、置信区间、地区/人群亚组。",
      "example": "某并发症在特定人群中的发生率。"
    },
    {
      "id": "network",
      "kind": "方法类型",
      "name": "网状Meta",
      "problem": "比较多个干预之间的相对效果并排序。",
      "fit": "多药物、多术式、多运动方案、多中成药或针灸方案。",
      "outputs": "网状图、联赛表、排序概率、SUCRA、节点拆分。",
      "example": "不同中成药联合常规治疗内异症的疗效比较。"
    },
    {
      "id": "metabox",
      "kind": "工具",
      "name": "MetaBox",
      "problem": "降低常用统计分析、图表输出和排错门槛。",
      "fit": "刚开始学习Meta/NMA、希望减少软件配置成本的学员。",
      "outputs": "森林图、漏斗图、网络图、格式检查和方向提醒。",
      "example": "把已整理的数据快速生成初步结果，用于课堂讨论。"
    }

  function esc(value) {
    return String(value ?? '').replace(/[&<>'"]/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[char]));
  }

  function routeFromHash() {
    const raw = (location.hash || '#/home').replace(/^#\/?/, '').split(/[?#]/)[0] || 'home';
    return aliases[raw] || (routes.includes(raw) ? raw : 'home');
  }

  function doiLink(doi) {
    return doi ? `https://doi.org/${esc(doi)}` : '';
  }

  function setToast(message) {
    if (!toast) return;
    toast.textContent = message;
    toast.classList.add('show');
    window.clearTimeout(setToast.timer);
    setToast.timer = window.setTimeout(() => toast.classList.remove('show'), 1800);
  }

  async function copyText(text, success) {
    try {
      await navigator.clipboard.writeText(text);
      setToast(success || '已复制');
    } catch (error) {
      const area = document.createElement('textarea');
      area.value = text;
      area.setAttribute('readonly', '');
      area.style.position = 'fixed';
      area.style.left = '-999px';
      document.body.appendChild(area);
      area.select();
      document.execCommand('copy');
      area.remove();
      setToast(success || '已复制');
    }
  }

  function metricStrip() {

  function renderPaperCard(paper) {
    const link = doiLink(paper.doi);
    return `<article class="paper-card"><div class="paper-cover"><img src="${esc(paper.cover)}" alt="${esc(paper.journal)} 论文首页" loading="lazy"></div><div class="paper-body"><div class="badges">${paper.badges.map(b => `<span>${esc(b)}</span>`).join('')}</div><h3>${esc(paper.title)}</h3><p>${esc(paper.journal)} · ${esc(paper.role)} · ${esc(paper.method)}</p><p class="paper-ability">${esc(paper.ability)}</p>${link ? `<a class="paper-link" href="${link}" target="_blank" rel="noopener noreferrer">打开 DOI</a>` : ''}</div></article>`;
  }

  function renderCases() {
    const filtered = getFilteredCases();
    const shown = filtered.slice(0, visibleCases);
    const fields = ['全部', '妇科', '中医药', '护理', '康复', '体育', '营养', '其他', '普通Meta', '网状Meta'];
    return `${pageHero('学员案例', '先看三个完整故事，再按专业和方法筛选案例库。')}
    <section class="section"><div class="container"><div class="section-head"><h2>三个重点案例故事。</h2><p>这些故事展示不同起点的学员如何推进选题、写作、投稿和返修。</p></div><div class="story-grid">${data.featuredStories.map(renderStoryCard).join('')}</div></div></section>
    <section class="section soft"><div class="container"><div class="section-head"><h2>成果概览。</h2><p>学生成果按专业方向和研究类型组织，保留题名、期刊、年份和 DOI / PMID，便于继续查看。</p></div><div class="overview-grid"><div class="overview-card"><strong>100+</strong><span>学生发表或接收</span></div><div class="overview-card"><strong>多专业</strong><span>覆盖中医药、护理、康复、临床医学等方向</span></div><div class="overview-card"><strong>多类型</strong><span>普通Meta、网状Meta、系统综述等研究</span></div><div class="overview-card"><strong>2024-2026</strong><span>持续沉淀的学生成果</span></div></div></div></section>
    <section class="section" id="case-library"><div class="container"><div class="section-head"><h2>案例库。</h2><p>点击专业或研究类型后，下方会直接切换到对应论文条目。</p></div><div class="filter-bar" role="toolbar" aria-label="案例筛选">${fields.map(field => `<button class="filter-button" type="button" data-case-filter="${esc(field)}" aria-pressed="${field === activeCaseFilter}">${esc(field)}</button>`).join('')}</div><div class="case-grid">${shown.map(renderCaseCard).join('') || '<p>当前筛选暂无对应条目。</p>'}</div><div class="load-wrap">${shown.length < filtered.length ? '<button class="btn secondary" type="button" data-load-cases>加载更多</button>' : ''}</div></div></section>`;
  }

  function getFilteredCases() {
    const f = activeCaseFilter;
    return data.studentRecords.filter(item => {
      const field = item.field || '';
      const type = item.type || '';
      if (f === '全部') return true;
      if (f === '妇科') return field.includes('妇科') || field.includes('男科');
      if (f === '中医药') return field.includes('中医药') || field.includes('针灸');
      if (f === '护理') return field.includes('护理');
      if (f === '康复') return field.includes('康复') || field.includes('运动');
      if (f === '体育') return field.includes('运动');
      if (f === '营养') return field.includes('营养');
      if (f === '普通Meta') return type === 'MA/SR';
      if (f === '网状Meta') return type === 'NMA';
      if (f === '其他') return !['中医药/针灸', '运动/康复', '男科/妇科', '代谢/营养'].includes(field);
      return true;
    });
  }

  function renderCaseCard(item) {
    const link = item.doi ? doiLink(item.doi) : '';
    const year = item.year || '已收录';
    return `<article class="case-card"><h3>${esc(item.title)}</h3><div class="case-meta"><span>${esc(item.field)}</span><span>${esc(item.type)}</span><span>${esc(year)}</span></div><p>${esc(item.journal)}${item.author ? ` · ${esc(item.author)}` : ''}</p>${item.pmid ? `<p class="case-small">PMID ${esc(item.pmid)}</p>` : ''}${link ? `<a class="paper-link" href="${link}" target="_blank" rel="noopener noreferrer">打开 DOI</a>` : ''}</article>`;
  }

  function renderServices() {
    const triage = data.triagePaths.find(item => item.id === activeTriage) || data.triagePaths[0];
    const rows = [
      ['课程名称', ...data.services.map(s => s.name)], ['适合对象', ...data.services.map(s => s.bestFor)], ['学习周期', ...data.services.map(s => s.cycle)], ['会议或沟通频率', ...data.services.map(s => s.meeting)], ['答疑方式', ...data.services.map(s => s.qa)], ['核心交付物', ...data.services.map(s => s.deliverables)], ['AI使用程度', ...data.services.map(s => s.ai)], ['价格', ...data.services.map(s => s.price)]
    ];
    return `${pageHero('课程与价格', '先判断你当前状态，再看更适合的学习与陪跑路径。')}
    <section class="section"><div class="container"><div class="section-head"><h2>当前状态选择。</h2></div><div class="choice-grid">${data.triagePaths.map(item => `<button class="choice-card ${item.id === activeTriage ? 'active' : ''}" type="button" data-triage="${esc(item.id)}" aria-pressed="${item.id === activeTriage}"><strong>${esc(item.title)}</strong><p>${esc(item.desc)}</p></button>`).join('')}</div><div class="recommend-box"><strong>${esc(triage.recommend)}</strong><p>${esc(triage.desc)}</p></div></div></section>
    <section class="section soft"><div class="container"><div class="section-head"><h2>三个核心服务对比。</h2><p>14天网状Meta入门训练用于建立框架，不等于保证14天完成并发表论文。完整方法学陪跑通常需要1-3个月。</p></div><div class="compare-table">${rows.map((row, i) => `<div class="compare-row ${i === 0 ? 'compare-head' : ''}">${row.map(cell => `<div>${esc(cell)}</div>`).join('')}</div>`).join('')}</div></div></section>
    <section class="section"><div class="container"><div class="section-head"><h2>专项服务。</h2><p>默认折叠，适合已有题目、稿件、审稿意见或复杂大修的同学。</p></div>${data.specialServices.map(item => `<details class="service-detail"><summary>${esc(item.name)} · ${esc(item.price)}</summary><p>${esc(item.desc)}</p></details>`).join('')}</div></section>
    <section class="section dark"><div class="container"><div class="section-head center"><h2>三阶段合作流程。</h2><p>先判断路径，再进入执行，不把报价和课表放在最前面。</p></div><div class="stage-grid">${data.stages.map(renderStageCard).join('')}</div></div></section>
    <section class="section soft"><div class="container"><div class="section-head"><h2>学术诚信边界。</h2></div>${renderBoundary()}</div></section>${finalCta()}`;
  }

  function renderAbout() {
    return `${pageHero('黄文锐', '医学博士、博士后｜中医妇科｜系统综述、Meta和网状Meta方向。我的定位不是替学生完成文章，而是训练他们判断临床问题、规范完成证据综合。')}
    <section class="section"><div class="container page-grid"><div class="about-photo"><img src="${esc(data.profile.portrait)}" alt="黄文锐职业照片" loading="lazy"></div><div class="about-list"><article class="about-card"><h3>学术背景</h3><p>广州中医药大学本硕博，医学博士，博士后，中医妇科方向。奖项包括国家奖学金、优秀毕业生。</p></article><article class="about-card"><h3>方法学研究轨迹</h3><p>从妇科临床问题出发，延伸到中医药、针灸、运动康复、营养、肿瘤等方向的证据综合。</p></article><article class="about-card"><h3>论文与审稿经历</h3><p>SCI发表35+，一作论文11篇，累计IF 130+。持续参与SCI同行评议，把审稿视角转化为投稿前检查清单。</p></article><article class="about-card"><h3>教学与带教原则</h3><p>累计带教300+名学员，2024-2026年学生发表/接收100+。最终目标是让学员建立独立完成循证研究的能力。</p></article></div></div></section>
    <section class="section"><div class="container"><div class="section-head"><h2>三篇代表论文。</h2></div><div class="paper-feature-grid">${data.featuredPublications.slice(0,3).map(renderPaperCard).join('')}</div></div></section>${finalCta()}`;
  }

  function renderPublications() {
    const categories = ['TOP精选', '第一作者', '共同第一作者'];
    const list = data.publications.filter(item => item.category === activePubCategory);
    return `${pageHero('代表论文', '顶部只展示三篇最能证明方法学能力的论文。完整列表按第一作者、共同第一作者和TOP精选折叠筛选。')}
    <section class="section"><div class="container"><div class="paper-feature-grid">${data.featuredPublications.slice(0,3).map(renderPaperCard).join('')}</div><div class="btn-row section-actions"><a class="btn secondary" href="${esc(data.profile.googleScholar)}" target="_blank" rel="noopener noreferrer">Google Scholar</a><a class="btn secondary" href="${esc(data.profile.orcid)}" target="_blank" rel="noopener noreferrer">ORCID</a></div></div></section>
    <section class="section soft"><div class="container"><div class="section-head"><h2>完整论文列表。</h2></div><div class="filter-bar" role="tablist" aria-label="论文分类">${categories.map(cat => `<button class="tab-button" type="button" role="tab" data-pub-category="${esc(cat)}" aria-selected="${cat === activePubCategory}">${esc(cat)}</button>`).join('')}</div><div class="publication-list">${list.map(renderPublicationItem).join('')}</div></div></section>`;
  }

  function renderPublicationItem(item) {
    const link = doiLink(item.doi);
    return `<article class="publication-item"><div class="pub-category">${esc(item.category)} ${esc(item.number)}</div><div><div class="pub-citation">${esc(item.citation)}</div><div class="badges inline-badges">${(item.badges || []).map(b => `<span>${esc(b)}</span>`).join('')}</div></div><div class="pub-actions">${link ? `<a href="${link}" target="_blank" rel="noopener noreferrer">DOI</a>` : ''}</div></article>`;
  }

  function renderMethods() {
    const current = data.methods.find(item => item.id === activeMethod) || data.methods[0];
    return `${pageHero('方法体系', '这是知识与专业证明页面。前七项是方法类型，MetaBox是工具。')}
    <section class="section"><div class="container methods-layout"><div class="method-tabs" role="tablist" aria-label="方法类型选择">${data.methods.map(item => `<button class="tab-button" type="button" role="tab" data-method="${esc(item.id)}" aria-selected="${item.id === current.id}">${esc(item.name)}</button>`).join('')}</div><article class="method-panel"><span class="kind">${esc(current.kind)}</span><h2>${esc(current.name)}</h2><dl><dt>解决什么问题</dt><dd>${esc(current.problem)}</dd><dt>适合哪些研究</dt><dd>${esc(current.fit)}</dd><dt>常见输出</dt><dd>${esc(current.outputs)}</dd><dt>真实示范题目</dt><dd>${esc(current.example)}</dd></dl><div class="btn-row section-actions"><a class="btn secondary" href="#/publications">查看相关论文</a><a class="btn secondary" href="#/cases">查看学生案例</a></div></article></div></section>`;
  }

  function renderContact() {
    const template = '专业 / 身份：\n目标时间：\n目前状态：\n已有材料：\n希望解决的问题：\n是否希望系统学习AI科研工作流：';
    return `${pageHero('预约分诊', '先发情况，不急着选班。我会根据专业、时间、材料和目标判断你适合哪条路径。')}
    <section class="section"><div class="container contact-grid"><div class="contact-panel"><h2>请直接发这6项。</h2><div class="template-box">${esc(template)}</div><div class="contact-actions"><button class="btn primary" type="button" data-copy="wechat">复制微信号</button><button class="btn secondary" type="button" data-copy="template">复制咨询模板</button><a class="btn secondary" href="mailto:${esc(data.profile.email)}">发邮件</a></div></div><div class="contact-panel"><h3>联系方式</h3><div class="contact-row"><span>微信</span><span>${esc(data.profile.wechat)}</span></div><div class="contact-row"><span>邮箱</span><span>${esc(data.profile.email)}</span></div><div class="contact-row"><span>小红书</span><span>${esc(data.profile.xiaohongshu)}</span></div><div class="contact-row"><span>Google Scholar</span><span>${esc(data.profile.googleScholarId)}</span></div><div class="qr-box light-qr"><div><img src="${esc(data.contactAssets.wechatQr)}" alt="黄文锐微信二维码"><p class="qr-note">扫码添加微信，也可以直接复制微信号。</p></div></div></div></div></section>`;
  }

  function render(options = {}) {
    const { anchor = '', scrollTop = true } = options;
    const route = routeFromHash();
    const renderers = { home: renderHome, cases: renderCases, services: renderServices, about: renderAbout, publications: renderPublications, methods: renderMethods, contact: renderContact };
    app.innerHTML = renderers[route]();
    app.focus({ preventScroll: true });
    updateNav(route);
    closeMenu();
    if (anchor) {
      window.requestAnimationFrame(() => {
        document.querySelector(anchor)?.scrollIntoView({ block: 'start', behavior: 'auto' });
      });
    } else if (scrollTop) {
      window.scrollTo({ top: 0, behavior: 'auto' });
    }
  }

  function updateNav(route) {
    document.querySelectorAll('[data-route]').forEach(link => {
      const isCurrent = link.dataset.route === route;
      if (isCurrent) link.setAttribute('aria-current', 'page');
      else link.removeAttribute('aria-current');
    });
  }

  function closeMenu() {
    if (!menuButton || !navLinks) return;
    menuButton.setAttribute('aria-expanded', 'false');
    navLinks.classList.remove('open');
    document.body.classList.remove('menu-open');
  }

  document.addEventListener('click', event => {
    const triageButton = event.target.closest('[data-triage]');
    if (triageButton) {
      activeTriage = triageButton.dataset.triage;
      render();
      return;
    }
    const caseFilter = event.target.closest('[data-case-filter]');
    if (caseFilter) {
      activeCaseFilter = caseFilter.dataset.caseFilter;
      visibleCases = 9;
      render({ anchor: '#case-library' });
      return;
    }
    if (event.target.closest('[data-load-cases]')) {
      visibleCases += 9;
      render({ anchor: '#case-library' });
      return;
    }
    const pubButton = event.target.closest('[data-pub-category]');
    if (pubButton) {
      activePubCategory = pubButton.dataset.pubCategory;
      render();
      return;
    }
    const methodButton = event.target.closest('[data-method]');
    if (methodButton) {
      activeMethod = methodButton.dataset.method;
      render();
      return;
    }
    const copyButton = event.target.closest('[data-copy]');
    if (copyButton) {
      const template = '专业 / 身份：\n目标时间：\n目前状态：\n已有材料：\n希望解决的问题：\n是否希望系统学习AI科研工作流：';
      if (copyButton.dataset.copy === 'wechat') copyText(data.profile.wechat, '微信号已复制');
      if (copyButton.dataset.copy === 'template') copyText(template, '咨询模板已复制');
    }
  });

  if (menuButton && navLinks) {
    menuButton.addEventListener('click', () => {
      const next = menuButton.getAttribute('aria-expanded') !== 'true';
      menuButton.setAttribute('aria-expanded', String(next));
      navLinks.classList.toggle('open', next);
      document.body.classList.toggle('menu-open', next);
    });
    navLinks.addEventListener('click', event => {
      if (event.target.closest('a')) closeMenu();
    });
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') closeMenu();
    });
  }

  window.addEventListener('hashchange', render);
  if (!location.hash) location.hash = '#/home';
  else render();
})();

</script>
</body>
</html>
